# Reusable workflow: Notify a Slack channel when a workflow job fails.
#
# Posts a message to Slack via an Incoming Webhook when the calling
# workflow fails. Skipped gracefully if the webhook secret is not
# configured yet.
#
# Supports optional @group mentions for urgent notifications via
# the `mention-group` input (Slack subteam/group ID).
#
# Usage:
#   jobs:
#     release:
#       # ... your release job ...
#
#     notify-release-failure:
#       needs: [build, test, release]
#       if: ${{ always() && contains(needs.*.result, 'failure') }}
#       uses: camunda/sdk-infra/.github/workflows/sdk-slack-notify.yml@v1
#       with:
#         repo-name: orchestration-cluster-api-python
#         workflow-name: Publish
#         mention-group: ${{ vars.SLACK_MENTION_GROUP }}
#       secrets:
#         slack-webhook-url: ${{ secrets.SLACK_SDK_ALERTS }}

name: Slack Notification

on:
  workflow_call:
    inputs:
      repo-name:
        description: 'Repository name (e.g. orchestration-cluster-api-python)'
        required: true
        type: string
      workflow-name:
        description: 'Name of the calling workflow (e.g. Publish, Release)'
        required: false
        default: 'Release'
        type: string
      mention-group:
        description: 'Slack group/subteam ID to @mention (e.g. S07XXXXXXXX). Empty = no mention.'
        required: false
        default: ''
        type: string
    secrets:
      slack-webhook-url:
        description: 'Slack Incoming Webhook URL'
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
    steps:
      - name: Build mention prefix
        id: mention
        run: |
          if [ -n "${{ inputs.mention-group }}" ]; then
            echo "prefix=<!subteam^${{ inputs.mention-group }}> " >> $GITHUB_OUTPUT
          else
            echo "prefix=" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ secrets.slack-webhook-url }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.mention.outputs.prefix }}:x: *${{ inputs.workflow-name }} failed* for `${{ inputs.repo-name }}` on `${{ github.ref_name }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.mention.outputs.prefix }}:x: *${{ inputs.workflow-name }} failed*\n\n*Repo:* `${{ inputs.repo-name }}`\n*Branch:* `${{ github.ref_name }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
