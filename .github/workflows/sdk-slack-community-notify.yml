# Reusable workflow: Notify Slack about community issues/PRs and Dependabot PRs.
#
# Called by SDK repos on `issues: [opened]` and `pull_request_target: [opened]`.
# Classifies the event by author association:
#
#   - Community (non-member, non-bot): urgent notification with @group mention
#   - Dependabot: non-urgent notification (no @mention)
#   - Maintainer/collaborator: skipped (no notification)
#
# Usage:
#   on:
#     issues:
#       types: [opened]
#     pull_request_target:
#       types: [opened]
#
#   jobs:
#     notify:
#       uses: camunda/sdk-infra/.github/workflows/sdk-slack-community-notify.yml@v1
#       with:
#         repo-name: orchestration-cluster-api-python
#         mention-group: ${{ vars.SLACK_MENTION_GROUP }}
#         author-association: ${{ github.event.pull_request.author_association || github.event.issue.author_association }}
#       secrets:
#         slack-webhook-url: ${{ secrets.SLACK_SDK_ALERTS }}

name: Slack Community Notification

on:
  workflow_call:
    inputs:
      repo-name:
        description: 'Repository name (e.g. orchestration-cluster-api-python)'
        required: true
        type: string
      mention-group:
        description: 'Slack group/subteam ID to @mention for community items (e.g. S07XXXXXXXX). Empty = no mention.'
        required: false
        default: ''
        type: string
      author-association:
        description: >-
          The author_association value from the caller event context
          (e.g. MEMBER, COLLABORATOR, NONE). Passed explicitly because
          reusable workflows may not reliably inherit all event fields.
        required: false
        default: ''
        type: string
    secrets:
      slack-webhook-url:
        description: 'Slack Incoming Webhook URL'
        required: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    outputs:
      category: ${{ steps.classify.outputs.category }}
      title: ${{ steps.classify.outputs.title }}
      url: ${{ steps.classify.outputs.url }}
      author: ${{ steps.classify.outputs.author }}
      event-type: ${{ steps.classify.outputs.event_type }}
    steps:
      - name: Classify event
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          # Explicit input from caller (preferred — avoids reusable workflow
          # context-inheritance edge cases with author_association)
          INPUT_ASSOC: ${{ inputs.author-association }}
          # Issue fields
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_ASSOC: ${{ github.event.issue.author_association }}
          # PR fields
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_ASSOC: ${{ github.event.pull_request.author_association }}
        run: |
          if [ "$EVENT_NAME" = "issues" ]; then
            echo "event_type=issue" >> $GITHUB_OUTPUT
            echo "title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
            echo "url=$ISSUE_URL" >> $GITHUB_OUTPUT
            echo "author=$ISSUE_AUTHOR" >> $GITHUB_OUTPUT
            EVENT_ASSOC="$ISSUE_ASSOC"
          else
            echo "event_type=pr" >> $GITHUB_OUTPUT
            echo "title=$PR_TITLE" >> $GITHUB_OUTPUT
            echo "url=$PR_URL" >> $GITHUB_OUTPUT
            echo "author=$PR_AUTHOR" >> $GITHUB_OUTPUT
            EVENT_ASSOC="$PR_ASSOC"
          fi

          # Prefer explicit input; fall back to event context
          ASSOC="${INPUT_ASSOC:-$EVENT_ASSOC}"
          echo "::debug::author_association input='$INPUT_ASSOC' event='$EVENT_ASSOC' resolved='$ASSOC' actor='$ACTOR'"

          # Dependabot
          if [ "$ACTOR" = "dependabot[bot]" ]; then
            echo "category=dependabot" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Skip other bots
          case "$ACTOR" in
            *\[bot\]) echo "category=skip" >> $GITHUB_OUTPUT; exit 0 ;;
          esac

          # Maintainers / collaborators — no notification
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "category=skip" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "category=community" >> $GITHUB_OUTPUT
              ;;
          esac

  notify-community:
    needs: classify
    if: needs.classify.outputs.category == 'community'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
    steps:
      - name: Build payload
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        id: payload
        env:
          MENTION_GROUP: ${{ inputs.mention-group }}
          EVENT_TYPE: ${{ needs.classify.outputs.event-type }}
          REPO_NAME: ${{ inputs.repo-name }}
          AUTHOR: ${{ needs.classify.outputs.author }}
          TITLE: ${{ needs.classify.outputs.title }}
          URL: ${{ needs.classify.outputs.url }}
        run: |
          # Escape Slack mrkdwn control characters in the title to prevent
          # injection via contributor-controlled issue/PR titles.
          SAFE_TITLE=$(echo "$TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          # Build payload inside jq filter expressions where \n is interpreted
          # as actual newlines (--arg treats \n as literal backslash-n).
          # The <!subteam^ID> mention is also built inside jq to avoid shell
          # escaping issues with <, >, and ! characters.
          PAYLOAD=$(jq -n \
            --arg mention_group "$MENTION_GROUP" \
            --arg event "$EVENT_TYPE" \
            --arg repo "$REPO_NAME" \
            --arg author "$AUTHOR" \
            --arg title "$SAFE_TITLE" \
            --arg url "$URL" \
            '(if $mention_group != "" then "<!subteam^" + $mention_group + "> " else "" end) as $prefix |
            {
              text: ($prefix + ":busts_in_silhouette: New community " + $event + " on `" + $repo + "`"),
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: ($prefix + ":busts_in_silhouette: *New community " + $event + "*\n\n*Repo:* `" + $repo + "`\n*Author:* `" + $author + "`\n*Title:* <" + $url + "|" + $title + ">")
                }
              }]
            }')
          echo "json<<ENDOFPAYLOAD" >> $GITHUB_OUTPUT
          echo "$PAYLOAD" >> $GITHUB_OUTPUT
          echo "ENDOFPAYLOAD" >> $GITHUB_OUTPUT

      - name: Send community notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ secrets.slack-webhook-url }}
          webhook-type: incoming-webhook
          payload: ${{ steps.payload.outputs.json }}

  notify-dependabot:
    needs: classify
    if: needs.classify.outputs.category == 'dependabot'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
    steps:
      - name: Build payload
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        id: payload
        env:
          REPO_NAME: ${{ inputs.repo-name }}
          TITLE: ${{ needs.classify.outputs.title }}
          URL: ${{ needs.classify.outputs.url }}
        run: |
          # Escape Slack mrkdwn control characters in the title to prevent
          # injection via contributor-controlled PR titles.
          SAFE_TITLE=$(echo "$TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg title "$SAFE_TITLE" \
            --arg url "$URL" \
            '{
              text: (":robot_face: Dependabot PR on `" + $repo + "`"),
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: (":robot_face: *Dependabot PR*\n\n*Repo:* `" + $repo + "`\n*Title:* <" + $url + "|" + $title + ">")
                }
              }]
            }')
          echo "json<<ENDOFPAYLOAD" >> $GITHUB_OUTPUT
          echo "$PAYLOAD" >> $GITHUB_OUTPUT
          echo "ENDOFPAYLOAD" >> $GITHUB_OUTPUT

      - name: Send Dependabot notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ secrets.slack-webhook-url }}
          webhook-type: incoming-webhook
          payload: ${{ steps.payload.outputs.json }}
