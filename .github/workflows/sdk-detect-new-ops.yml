# Reusable workflow: Detect operations missing SDK example coverage.
#
# Compares the spec's operationIds against each SDK's operation-map.json
# (fetched from GitHub) and opens tracking issues for uncovered operations.
#
# Creates:
#   - A summary issue in the calling repo with the full cross-SDK coverage table
#   - Per-SDK issues in each repo that has missing coverage (requires vault secrets)
#   - All issues link to each other for traceability
#
# Usage:
#   jobs:
#     detect:
#       needs: bundle
#       uses: camunda/sdk-infra/.github/workflows/sdk-detect-new-ops.yml@v1
#       with:
#         spec-artifact: bundled-spec
#       secrets:
#         vault-addr: ${{ secrets.VAULT_ADDR }}
#         vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
#         vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

name: Detect New Operations

on:
  workflow_call:
    inputs:
      spec-artifact:
        description: 'Artifact name containing the bundled spec.'
        required: false
        default: 'bundled-spec'
        type: string
    secrets:
      sdk-issue-token:
        description: 'DEPRECATED — use vault secrets instead. Token with issues:write on SDK repos for cross-repo issue creation.'
        required: false
      vault-addr:
        description: 'Vault server URL'
        required: false
      vault-role-id:
        description: 'Vault AppRole role ID'
        required: false
      vault-secret-id:
        description: 'Vault AppRole secret ID'
        required: false
    outputs:
      new-operations:
        description: 'JSON array of uncovered operations (empty array if none).'
        value: ${{ jobs.detect.outputs.uncovered }}

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      uncovered: ${{ steps.diff.outputs.uncovered }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.spec-artifact }}
          path: current-spec/

      - name: Fetch SDK operation maps
        run: |
          mkdir -p sdk-maps
          for repo in orchestration-cluster-api-js orchestration-cluster-api-python orchestration-cluster-api-csharp; do
            curl -sfL \
              -H "Authorization: token ${{ github.token }}" \
              "https://raw.githubusercontent.com/camunda/${repo}/main/examples/operation-map.json" \
              -o "sdk-maps/${repo}.json" || echo "{}" > "sdk-maps/${repo}.json"
          done

      - name: Compare spec against SDK coverage
        id: diff
        run: |
          node -e "
            const fs = require('fs');
            const spec = JSON.parse(fs.readFileSync('current-spec/rest-api.bundle.json', 'utf8'));

            const ops = [];
            for (const [path, item] of Object.entries(spec.paths || {})) {
              for (const [method, op] of Object.entries(item)) {
                if (op.operationId) {
                  ops.push({ operationId: op.operationId, method: method.toUpperCase(), path });
                }
              }
            }
            console.log('Spec operations: ' + ops.length);

            const jsMap = JSON.parse(fs.readFileSync('sdk-maps/orchestration-cluster-api-js.json', 'utf8'));
            const pyMap = JSON.parse(fs.readFileSync('sdk-maps/orchestration-cluster-api-python.json', 'utf8'));
            const csMap = JSON.parse(fs.readFileSync('sdk-maps/orchestration-cluster-api-csharp.json', 'utf8'));

            const jsKeys = new Set(Object.keys(jsMap));
            const pyKeys = new Set(Object.keys(pyMap));
            const csKeys = new Set(Object.keys(csMap));

            function toSnakeCase(name) {
              return name.replace(/([A-Z]+)([A-Z][a-z])/g, '\$1_\$2')
                         .replace(/([a-z0-9])([A-Z])/g, '\$1_\$2')
                         .toLowerCase();
            }

            const uncovered = [];
            for (const op of ops) {
              const id = op.operationId;
              const js = jsKeys.has(id);
              const py = pyKeys.has(toSnakeCase(id));
              const cs = csKeys.has(id);
              if (!js || !py || !cs) {
                uncovered.push({ ...op, js, py, cs });
              }
            }

            console.log('Uncovered in at least one SDK: ' + uncovered.length);
            for (const op of uncovered) {
              const flags = [op.js ? 'JS:ok' : 'JS:missing', op.py ? 'PY:ok' : 'PY:missing', op.cs ? 'CS:ok' : 'CS:missing'].join(' ');
              console.log('  ' + op.operationId + ' (' + flags + ')');
            }
            fs.writeFileSync('/tmp/uncovered.json', JSON.stringify(uncovered));
          "
          echo "uncovered=$(cat /tmp/uncovered.json)" >> $GITHUB_OUTPUT

      - name: Import Vault secrets
        id: vault-secrets
        if: steps.diff.outputs.uncovered != '[]' && steps.diff.outputs.uncovered != ''
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        continue-on-error: true
        with:
          url: ${{ secrets.vault-addr }}
          method: approle
          roleId: ${{ secrets.vault-role-id }}
          secretId: ${{ secrets.vault-secret-id }}
          secrets: |
            secret/data/products/onboarding-and-migration/github.com/apps/camunda/camunda-sdk-automation app_id;
            secret/data/products/onboarding-and-migration/github.com/apps/camunda/camunda-sdk-automation private_key;
          exportEnv: true

      - name: Generate GitHub App token
        id: app-token
        if: steps.vault-secrets.outcome == 'success'
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ env.app_id }}
          private_key: ${{ env.private_key }}

      - name: Open tracking issues
        if: steps.diff.outputs.uncovered != '[]' && steps.diff.outputs.uncovered != ''
        uses: actions/github-script@v7
        env:
          SDK_ISSUE_TOKEN: ${{ steps.app-token.outputs.token || secrets.sdk-issue-token }}
        with:
          script: |
            // Check for existing open summary issue first
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'new-operations',
              state: 'open',
            });
            if (issues.length > 0) {
              console.log('Open tracking issue already exists: ' + issues[0].html_url);
              return;
            }

            const uncovered = JSON.parse('${{ steps.diff.outputs.uncovered }}');
            if (!uncovered.length) return;

            const owner = 'camunda';
            const icon = (v) => v ? ':white_check_mark:' : ':x:';

            // --- Per-SDK issue creation ---
            const sdkRepos = [
              { repo: 'orchestration-cluster-api-js',     label: 'JS',     field: 'js' },
              { repo: 'orchestration-cluster-api-python',  label: 'Python', field: 'py' },
              { repo: 'orchestration-cluster-api-csharp',  label: 'C#',    field: 'cs' },
            ];

            const sdkToken = process.env.SDK_ISSUE_TOKEN;
            let sdkOctokit = null;
            if (sdkToken) {
              const { Octokit } = await import('@octokit/rest');
              sdkOctokit = new Octokit({ auth: sdkToken });
            } else {
              console.log('sdk-issue-token not provided — skipping per-SDK issues.');
            }

            const sdkIssueLinks = [];

            for (const sdk of sdkRepos) {
              const missing = uncovered.filter(op => !op[sdk.field]);
              if (!missing.length) {
                console.log(`${sdk.label}: fully covered — skipping.`);
                continue;
              }

              if (!sdkOctokit) {
                console.log(`${sdk.label}: ${missing.length} missing, but no token to create issue.`);
                continue;
              }

              try {
                const { data: existing } = await sdkOctokit.rest.issues.listForRepo({
                  owner,
                  repo: sdk.repo,
                  labels: 'new-operations',
                  state: 'open',
                });
                if (existing.length > 0) {
                  console.log(`${sdk.label}: open issue already exists: ${existing[0].html_url}`);
                  sdkIssueLinks.push(`- **${sdk.label}**: ${existing[0].html_url}`);
                  continue;
                }
              } catch (e) {
                console.log(`${sdk.label}: failed to check existing issues: ${e.message}`);
                continue;
              }

              const rows = missing.map(op =>
                `| \`${op.operationId}\` | \`${op.method}\` | \`${op.path}\` |`
              ).join('\n');

              const sdkBody = [
                '## Operations missing example coverage',
                '',
                '| Operation | Method | Path |',
                '|-----------|--------|------|',
                rows,
                '',
                'Add an `operation-map.json` entry and example code for each operation listed above.',
                '',
                '_Auto-generated by the [sdk-detect-new-ops](https://github.com/camunda/sdk-infra/actions/workflows/sdk-detect-new-ops.yml) workflow.',
                'The summary issue with cross-SDK coverage will be linked below once created._',
              ].join('\n');

              const opNames = missing.map(o => o.operationId).join(', ');

              try {
                const { data: sdkIssue } = await sdkOctokit.rest.issues.create({
                  owner,
                  repo: sdk.repo,
                  title: `Missing example coverage: ${opNames}`,
                  body: sdkBody,
                  labels: ['new-operations'],
                });
                console.log(`${sdk.label}: created ${sdkIssue.html_url}`);
                sdkIssueLinks.push(`- **${sdk.label}**: ${sdkIssue.html_url}`);
              } catch (e) {
                console.log(`${sdk.label}: failed to create issue: ${e.message}`);
              }
            }

            // --- Summary issue ---
            const rows = uncovered.map(op =>
              `| \`${op.operationId}\` | \`${op.method}\` | \`${op.path}\` | ${icon(op.js)} | ${icon(op.py)} | ${icon(op.cs)} |`
            ).join('\n');

            const linkedSection = sdkIssueLinks.length
              ? '\n\n### Linked SDK issues\n\n' + sdkIssueLinks.join('\n')
              : '';

            const summaryBody = [
              '## Operations missing SDK example coverage',
              '',
              '| Operation | Method | Path | JS | Python | C# |',
              '|-----------|--------|------|----|--------|----|',
              rows,
              '',
              'Each SDK repo should add an `operation-map.json` entry and example code for uncovered operations.',
              linkedSection,
              '',
              '_Auto-generated by the `sdk-detect-new-ops` workflow. Coverage is determined by each SDK\'s `examples/operation-map.json`._',
            ].join('\n');

            const { data: summaryIssue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `SDK coverage gaps: ${uncovered.map(o => o.operationId).join(', ')}`,
              body: summaryBody,
              labels: ['new-operations', 'sdk-coverage'],
            });
            console.log(`Summary issue: ${summaryIssue.html_url}`);

            // --- Back-link SDK issues to the summary ---
            if (sdkOctokit && sdkIssueLinks.length) {
              for (const sdk of sdkRepos) {
                const missing = uncovered.filter(op => !op[sdk.field]);
                if (!missing.length) continue;
                try {
                  const { data: sdkIssues } = await sdkOctokit.rest.issues.listForRepo({
                    owner,
                    repo: sdk.repo,
                    labels: 'new-operations',
                    state: 'open',
                    sort: 'created',
                    direction: 'desc',
                    per_page: 1,
                  });
                  if (sdkIssues.length) {
                    await sdkOctokit.rest.issues.createComment({
                      owner,
                      repo: sdk.repo,
                      issue_number: sdkIssues[0].number,
                      body: `Cross-SDK summary: ${summaryIssue.html_url}`,
                    });
                  }
                } catch (e) {
                  console.log(`${sdk.label}: failed to back-link: ${e.message}`);
                }
              }
            }
