# Reusable workflow: Detect new operations in the bundled spec.
#
# Compares the current spec's operationIds against the previous release
# and opens a tracking issue if new operations are found.
#
# Usage:
#   jobs:
#     detect:
#       needs: bundle
#       uses: camunda/sdk-infra/.github/workflows/sdk-detect-new-ops.yml@v1
#       with:
#         spec-artifact: bundled-spec

name: Detect New Operations

on:
  workflow_call:
    inputs:
      spec-artifact:
        description: 'Artifact name containing the bundled spec.'
        required: false
        default: 'bundled-spec'
        type: string
    outputs:
      new-operations:
        description: 'JSON array of new operationIds (empty array if none).'
        value: ${{ jobs.detect.outputs.new-ops }}

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      new-ops: ${{ steps.diff.outputs.new_ops }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.spec-artifact }}
          path: current-spec/

      - name: Extract current operations
        id: diff
        run: |
          # Extract all operationIds from the current spec
          node -e "
            const spec = JSON.parse(require('fs').readFileSync('current-spec/rest-api.bundle.json', 'utf8'));
            const ops = [];
            for (const [path, item] of Object.entries(spec.paths || {})) {
              for (const [method, op] of Object.entries(item)) {
                if (op.operationId) {
                  ops.push({ operationId: op.operationId, method: method.toUpperCase(), path });
                }
              }
            }
            require('fs').writeFileSync('current-ops.json', JSON.stringify(ops, null, 2));
            console.log('Current operations: ' + ops.length);
          "

          # Compare against previous release if available
          if [ -f operations-baseline.json ]; then
            node -e "
              const current = JSON.parse(require('fs').readFileSync('current-ops.json', 'utf8'));
              const baseline = JSON.parse(require('fs').readFileSync('operations-baseline.json', 'utf8'));
              const baseIds = new Set(baseline.map(o => o.operationId));
              const newOps = current.filter(o => !baseIds.has(o.operationId));
              console.log('New operations: ' + newOps.length);
              for (const op of newOps) console.log('  + ' + op.operationId + ' (' + op.method + ' ' + op.path + ')');
              require('fs').writeFileSync('/tmp/new-ops.json', JSON.stringify(newOps));
            "
            echo "new_ops=$(cat /tmp/new-ops.json)" >> $GITHUB_OUTPUT
          else
            echo "No baseline found — skipping diff."
            echo 'new_ops=[]' >> $GITHUB_OUTPUT
          fi

      - name: Open tracking issue
        if: steps.diff.outputs.new_ops != '[]' && steps.diff.outputs.new_ops != ''
        uses: actions/github-script@v7
        with:
          script: |
            const newOps = JSON.parse('${{ steps.diff.outputs.new_ops }}');
            if (!newOps.length) return;

            const rows = newOps.map(op =>
              `| \`${op.operationId}\` | \`${op.method}\` | \`${op.path}\` | :x: | :x: | :x: |`
            ).join('\n');

            const body = `## New operations detected in spec

            | Operation | Method | Path | JS | Python | C# |
            |-----------|--------|------|----|--------|----|
            ${rows}

            Each SDK repo should add an \`operation-map.json\` entry and example code for these operations.

            This issue was auto-generated by the \`sdk-detect-new-ops\` workflow.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New API operations: ${newOps.map(o => o.operationId).join(', ')}`,
              body,
              labels: ['new-operations', 'sdk-coverage'],
            });
