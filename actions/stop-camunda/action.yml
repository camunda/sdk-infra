# Composite action: Capture Docker logs and shut down the Camunda stack.
#
# Should be called in an `if: always()` step after integration tests.
#
# Usage:
#   - uses: camunda/sdk-infra/actions/stop-camunda@v1
#     if: always()
#     with:
#       stack: full

name: Stop Camunda
description: Capture Docker logs and shut down the Camunda stack.

inputs:
  stack:
    description: 'Stack variant that was started: "simple" or "full".'
    required: false
    default: 'simple'
  docker-dir:
    description: 'Path to the Docker Compose directory.'
    required: false
    default: ''
  upload-logs:
    description: 'Upload Docker logs as artifact on failure.'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the logs artifact.'
    required: false
    default: 'docker-logs'

runs:
  using: composite
  steps:
    - name: Resolve Docker directory
      id: resolve
      shell: bash
      run: |
        if [ -n "${{ inputs.docker-dir }}" ]; then
          echo "dir=${{ inputs.docker-dir }}" >> $GITHUB_OUTPUT
        else
          echo "dir=${{ github.action_path }}/../docker" >> $GITHUB_OUTPUT
        fi

        if [ "${{ inputs.stack }}" == "full" ]; then
          echo "file=docker-compose-full.yaml" >> $GITHUB_OUTPUT
        else
          echo "file=docker-compose.yaml" >> $GITHUB_OUTPUT
        fi

    - name: Capture Docker logs
      shell: bash
      run: |
        mkdir -p _logs
        docker compose \
          -f ${{ steps.resolve.outputs.dir }}/${{ steps.resolve.outputs.file }} \
          logs > _logs/compose.log 2>&1 || true
        echo "Docker logs captured to _logs/compose.log"

    - name: Shutdown stack
      shell: bash
      working-directory: ${{ steps.resolve.outputs.dir }}
      run: |
        docker compose -f ${{ steps.resolve.outputs.file }} down -v || true

    - name: Upload logs artifact
      if: failure() && inputs.upload-logs == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: _logs/compose.log
